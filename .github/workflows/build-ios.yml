name: Build iOS (cloud Mac)

# Builds the iOS player on a GitHub-hosted macOS runner — so iOS can be built WITHOUT you
# owning a Mac. game-ci runs Unity on macOS and produces an Xcode project; an optional second
# job archives + exports a signed .ipa when you provide Apple signing secrets.
#
# REQUIRED secret (Settings → Secrets and variables → Actions) to run at all:
#   UNITY_LICENSE / UNITY_EMAIL / UNITY_PASSWORD   (same as the WebGL workflow; game-ci activation)
#
# OPTIONAL secrets to also produce a signed/TestFlight .ipa (needs your Apple Developer account):
#   IOS_CERTIFICATE_BASE64, IOS_CERTIFICATE_PASSWORD, IOS_PROVISIONING_PROFILE_BASE64,
#   APPLE_TEAM_ID, IOS_BUNDLE_ID (must match the provisioning profile)
#
# Trigger is manual (workflow_dispatch) so it only runs when you ask and have the secrets.

on:
  workflow_dispatch: {}

jobs:
  build-xcode-project:
    name: Unity → Xcode project (macOS runner)
    runs-on: macos-14
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          lfs: false

      - name: Cache Unity Library
        uses: actions/cache@v4
        with:
          path: Library
          key: Library-iOS-${{ hashFiles('Assets/**', 'Packages/**', 'ProjectSettings/**') }}
          restore-keys: |
            Library-iOS-
            Library-

      - name: Build (game-ci, iOS)
        uses: game-ci/unity-builder@v4
        env:
          UNITY_LICENSE: ${{ secrets.UNITY_LICENSE }}
          UNITY_EMAIL: ${{ secrets.UNITY_EMAIL }}
          UNITY_PASSWORD: ${{ secrets.UNITY_PASSWORD }}
        with:
          unityVersion: 6000.4.8f1
          targetPlatform: iOS
          allowDirtyBuild: true

      - name: Upload Xcode project artifact
        uses: actions/upload-artifact@v4
        with:
          name: iOS-Xcode-Project
          path: build/iOS
          retention-days: 7

