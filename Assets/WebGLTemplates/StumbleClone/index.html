<!DOCTYPE html>
<html lang="en-us">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <meta name="theme-color" content="#0E1018" />
    <title>{{{ PRODUCT_NAME }}}</title>
    <link rel="shortcut icon" href="TemplateData/favicon.ico" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;500;600;700&display=swap" rel="stylesheet" />
    <style>
      :root {
        --bg-deep: #0E1018;
        --bg-grad-1: #1B2030;
        --bg-grad-2: #0E1018;
        --pink: #EC4899;
        --purple: #8B5CF6;
        --gold: #FFD24D;
        --on-surface: #F8FAFC;
        --muted: #94A3B8;
      }
      * { box-sizing: border-box; }
      html, body {
        margin: 0; padding: 0; height: 100%; width: 100%;
        background: var(--bg-deep);
        overflow: hidden;
        font-family: "Fredoka", system-ui, -apple-system, "Segoe UI", sans-serif;
        color: var(--on-surface);
      }
      /* Themed backdrop behind the game canvas */
      #bg {
        position: fixed; inset: 0; z-index: 0;
        background:
          radial-gradient(1200px 700px at 50% -10%, rgba(236, 72, 153, 0.22), transparent 60%),
          radial-gradient(900px 600px at 100% 110%, rgba(139, 92, 246, 0.18), transparent 60%),
          linear-gradient(160deg, var(--bg-grad-1), var(--bg-grad-2) 70%);
      }
      #game-wrap {
        position: fixed; inset: 0; z-index: 1;
        display: flex; align-items: center; justify-content: center;
      }
      /* Center the game as a 16:9 stage that leaves a margin, so the themed backdrop is
         always visible framing it (a full-bleed canvas covers the gradient entirely — and on
         a 16:9 monitor a pure letterbox is full-bleed). Use the Fullscreen button for edge-to-edge. */
      #unity-canvas {
        aspect-ratio: 16 / 9;
        width: min(90vw, calc(85vh * 16 / 9));
        height: min(85vh, calc(90vw * 9 / 16));
        display: block; background: transparent;
        border-radius: 16px;
        box-shadow: 0 24px 80px rgba(0, 0, 0, 0.55);
        touch-action: none;
      }
      /* On phones, fill the screen — the backdrop frame is a desktop nicety. */
      @media (max-width: 820px) {
        #unity-canvas { width: 100vw; height: 100dvh; border-radius: 0; box-shadow: none; }
      }
      /* Loading screen */
      #loading {
        position: fixed; inset: 0; z-index: 5;
        display: flex; flex-direction: column; align-items: center; justify-content: center;
        gap: 28px; transition: opacity 0.4s ease;
      }
      #game-title {
        font-weight: 700; font-size: clamp(34px, 7vw, 84px);
        letter-spacing: 1px; color: var(--gold);
        text-shadow: 0 4px 0 rgba(0,0,0,0.25), 0 0 36px rgba(255, 210, 77, 0.35);
        animation: bob 2.2s ease-in-out infinite;
      }
      @keyframes bob { 0%,100% { transform: translateY(0); } 50% { transform: translateY(-8px); } }
      #tagline { color: var(--muted); font-size: clamp(13px, 2.4vw, 20px); margin-top: -14px; }
      #bar {
        width: min(62vw, 420px); height: 16px; border-radius: 999px;
        background: rgba(255,255,255,0.10); overflow: hidden;
        box-shadow: inset 0 1px 3px rgba(0,0,0,0.4);
      }
      #bar-fill {
        width: 0%; height: 100%; border-radius: 999px;
        background: linear-gradient(90deg, var(--pink), var(--gold));
        transition: width 0.2s ease;
      }
      #loading-pct { color: var(--muted); font-size: 15px; font-weight: 500; }
      @media (prefers-reduced-motion: reduce) {
        #game-title { animation: none; }
      }
      /* Fullscreen control */
      #fs-btn {
        position: fixed; right: 16px; bottom: 16px; z-index: 6;
        width: 44px; height: 44px; border: 0; border-radius: 14px;
        background: rgba(27, 32, 48, 0.72); color: var(--on-surface);
        backdrop-filter: blur(6px); cursor: pointer;
        display: flex; align-items: center; justify-content: center;
        transition: transform 0.15s ease, background 0.15s ease;
      }
      #fs-btn:hover { background: rgba(236, 72, 153, 0.85); transform: scale(1.06); }
      #fs-btn svg { width: 22px; height: 22px; fill: currentColor; }
      /* Warning / error banner */
      #unity-warning {
        position: fixed; left: 50%; top: 16px; transform: translateX(-50%); z-index: 10;
        max-width: 90vw;
      }
      #unity-warning > div { border-radius: 10px; margin-bottom: 6px; }
      /* Footer — privacy link (also the public URL submitted to app stores) */
      #site-footer {
        position: fixed; left: 0; right: 0; bottom: 8px; z-index: 4;
        text-align: center; font-size: 13px; color: var(--muted);
        pointer-events: none;
      }
      #site-footer a { color: var(--muted); text-decoration: none; pointer-events: auto; }
      #site-footer a:hover { color: var(--on-surface); text-decoration: underline; }
      @media (max-width: 820px) { #site-footer { display: none; } }
    </style>
  </head>
  <body>
    <div id="bg"></div>
    <div id="game-wrap">
      <canvas id="unity-canvas" tabindex="-1"></canvas>
    </div>

    <div id="loading">
      <div id="game-title">{{{ PRODUCT_NAME }}}</div>
      <div id="tagline">Knockout party arena — last one standing wins</div>
      <div id="bar"><div id="bar-fill"></div></div>
      <div id="loading-pct">Loading… 0%</div>
    </div>

    <button id="fs-btn" title="Fullscreen" aria-label="Toggle fullscreen">
      <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M4 4h6v2H6v4H4V4zm10 0h6v6h-2V6h-4V4zM4 14h2v4h4v2H4v-6zm14 0h2v6h-6v-2h4v-4z"/></svg>
    </button>

    <div id="unity-warning"></div>

    <div id="site-footer">
      <a href="privacy.html" target="_blank" rel="noopener">Privacy Policy</a> &nbsp;·&nbsp; &copy; 2026 StumbleClone
    </div>

    <script>
      var canvas = document.querySelector("#unity-canvas");
      var loading = document.querySelector("#loading");
      var barFill = document.querySelector("#bar-fill");
      var loadingPct = document.querySelector("#loading-pct");

      function unityShowBanner(msg, type) {
        var warningBanner = document.querySelector("#unity-warning");
        function updateVisibility() {
          warningBanner.style.display = warningBanner.children.length ? "block" : "none";
        }
        var div = document.createElement("div");
        div.innerHTML = msg;
        warningBanner.appendChild(div);
        if (type == "error") div.style = "background: #EF4444; color:#fff; padding: 10px;";
        else {
          if (type == "warning") div.style = "background: #F59E0B; color:#111; padding: 10px;";
          setTimeout(function () {
            warningBanner.removeChild(div);
            updateVisibility();
          }, 5000);
        }
        updateVisibility();
      }

      var buildUrl = "Build";
      var loaderUrl = buildUrl + "/{{{ LOADER_FILENAME }}}";
      var config = {
        dataUrl: buildUrl + "/{{{ DATA_FILENAME }}}",
        frameworkUrl: buildUrl + "/{{{ FRAMEWORK_FILENAME }}}",
        codeUrl: buildUrl + "/{{{ CODE_FILENAME }}}",
#if MEMORY_FILENAME
        memoryUrl: buildUrl + "/{{{ MEMORY_FILENAME }}}",
#endif
#if SYMBOLS_FILENAME
        symbolsUrl: buildUrl + "/{{{ SYMBOLS_FILENAME }}}",
#endif
        streamingAssetsUrl: "StreamingAssets",
        companyName: {{{ JSON.stringify(COMPANY_NAME) }}},
        productName: {{{ JSON.stringify(PRODUCT_NAME) }}},
        productVersion: {{{ JSON.stringify(PRODUCT_VERSION) }}},
        showBanner: unityShowBanner,
      };

      // Fill the browser window; let Unity match the render target to the canvas size * DPR.
      var meta = document.createElement("meta");
      meta.name = "viewport";
      meta.content = "width=device-width, height=device-height, initial-scale=1.0, user-scalable=no, shrink-to-fit=yes";
      document.getElementsByTagName("head")[0].appendChild(meta);

      var script = document.createElement("script");
      script.src = loaderUrl;
      script.onload = () => {
        createUnityInstance(canvas, config, (progress) => {
          var pct = Math.round(100 * progress);
          barFill.style.width = pct + "%";
          loadingPct.textContent = "Loading… " + pct + "%";
        })
          .then((unityInstance) => {
            loading.style.opacity = "0";
            setTimeout(function () { loading.style.display = "none"; }, 450);
            document.querySelector("#fs-btn").onclick = () => {
              unityInstance.SetFullscreen(1);
            };
          })
          .catch((message) => {
            loadingPct.textContent = "Failed to load.";
            unityShowBanner(message, "error");
          });
      };
      document.body.appendChild(script);
    </script>
  </body>
</html>
